<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>封鎖線：六重天 (The Breach)</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #eee; font-family: "Microsoft JhengHei", sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #game-ui { width: 800px; display: flex; justify-content: space-between; margin-bottom: 10px; background: #333; padding: 15px; border-radius: 8px; border: 2px solid #555; box-sizing: border-box; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        #game-container { position: relative; width: 800px; height: 600px; background: #222; border: 4px solid #444; overflow: hidden; box-shadow: inset 0 0 50px #000; }
        
        /* 實體樣式 */
        .entity { position: absolute; display: flex; justify-content: center; align-items: center; font-weight: bold; user-select: none; transition: transform 0.05s; }
        .player { width: 45px; height: 45px; background: #3498db; border: 3px solid #fff; bottom: 30px; left: 377px; border-radius: 50%; z-index: 10; box-shadow: 0 0 15px #3498db; }
        .enemy { width: 35px; height: 35px; background: #e74c3c; border: 2px solid #c0392b; color: white; border-radius: 50%; font-size: 11px; z-index: 5; }
        .cover { width: 90px; height: 30px; background: #7f8c8d; border: 2px solid #95a5a6; color: #fff; font-size: 10px; flex-direction: column; border-radius: 5px; z-index: 8; box-shadow: 0 5px 10px rgba(0,0,0,0.3); }
        
        /* 特效 */
        .bullet { width: 6px; height: 14px; background: #f1c40f; border-radius: 3px; position: absolute; box-shadow: 0 0 8px #f1c40f; }
        .explosion { width: 100px; height: 100px; background: radial-gradient(circle, #e67e22, transparent); border-radius: 50%; position: absolute; transform: translate(-50%, -50%); animation: explode 0.4s forwards; z-index: 20; pointer-events: none; }
        
        /* 道具 */
        .item { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; animation: pulse 1s infinite; border: 2px solid white; z-index: 9; box-shadow: 0 0 10px #fff; }
        .potion { background: #2ecc71; } /* 藥水 */
        .g-pack { background: #f39c12; }  /* 手榴彈包 */

        @keyframes explode { 0% { transform: translate(-50%, -50%) scale(0.1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.25); } 100% { transform: scale(1); } }

        /* 選單疊加層 */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        button { padding: 15px 40px; font-size: 24px; background: #e67e22; border: none; color: white; cursor: pointer; border-radius: 8px; margin: 15px; transition: 0.2s; }
        button:hover { background: #d35400; transform: scale(1.05); }
        .stat-val { color: #f1c40f; font-weight: bold; font-size: 22px; }
        .instructions { font-size: 16px; color: #aaa; margin-top: 20px; border-top: 1px solid #444; padding-top: 15px; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div>層數: <span id="ui-layer" class="stat-val">1</span>/6</div>
        <div>血量: <span id="ui-hp" class="stat-val" style="color:#ff7675">50</span></div>
        <div>子彈: <span id="ui-ammo" class="stat-val">20</span>/20</div>
        <div>手榴彈: <span id="ui-grenade" class="stat-val">3</span></div>
        <div>敵人剩餘: <span id="ui-enemy-count" class="stat-val">0</span></div>
    </div>

    <div id="game-container">
        <div id="player" class="entity player">我</div>
        <div id="overlay" class="overlay">
            <h1 id="overlay-title">封鎖線：六重天</h1>
            <p id="overlay-desc">準備好清除第 1 層的威脅嗎？</p>
            <button id="start-btn">開始任務</button>
            <div class="instructions">
                滑鼠左鍵：射擊敵人 | G鍵：投放手榴彈(全場傷害20)<br>
                擊殺敵人可獲得 6 發子彈補給 | 點擊掉落物可獲得增益或手榴彈
            </div>
        </div>
    </div>

<script>
    const config = {
        maxLayers: 6,
        playerMaxHp: 50,
        bulletDmg: 15,
        grenadeDmg: 20,
        enemyMaxHp: 30,
        coverMaxHp: 150,
        ammoAward: 6
    };

    let game = {
        active: false,
        layer: 1,
        hp: config.playerMaxHp,
        ammo: 20,
        grenades: 3,
        enemies: [],
        covers: [],
        bullets: []
    };

    const container = document.getElementById('game-container');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');

    startBtn.onclick = () => {
        if(game.layer === 1) {
            game.hp = config.playerMaxHp;
            game.ammo = 20;
            game.grenades = 3;
        }
        overlay.style.display = 'none';
        game.active = true;
        initLevel();
        requestAnimationFrame(gameLoop);
    };

    function initLevel() {
        container.querySelectorAll('.enemy, .cover, .bullet, .item').forEach(el => el.remove());
        game.enemies = []; game.covers = []; game.bullets = [];

        // 敵人增長 2, 4, 8, 16, 32, 64
        const enemyCount = Math.pow(2, game.layer);
        for(let i=0; i<enemyCount; i++) createEnemy();

        // 掩體生成：隨層數增加複雜度
        const coverCount = 2 + game.layer;
        for(let i=0; i<coverCount; i++) createCover();
        
        updateUI();
    }

    function createEnemy() {
        const el = document.createElement('div');
        el.className = 'entity enemy';
        container.appendChild(el);
        const enemy = { 
            el, 
            hp: config.enemyMaxHp, 
            x: Math.random() * 750, 
            y: 40 + Math.random() * 200, 
            lastShoot: Date.now() + Math.random() * 3000 
        };
        game.enemies.push(enemy);
    }

    function createCover() {
        const el = document.createElement('div');
        el.className = 'entity cover';
        container.appendChild(el);
        const cover = { 
            el, 
            hp: config.coverMaxHp, 
            x: 50 + Math.random() * 650, 
            y: 350 + (Math.random() * 100) 
        };
        game.covers.push(cover);
    }

    // 鍵盤監聽 - 手榴彈
    window.onkeydown = (e) => {
        if(e.key.toLowerCase() === 'g' && game.active && game.grenades > 0) {
            throwGrenade();
        }
    };

    function throwGrenade() {
        game.grenades--;
        game.enemies.forEach(en => {
            en.hp -= config.grenadeDmg;
            if(en.hp <= 0) handleEnemyDeath(en);
        });
        
        const explosion = document.createElement('div');
        explosion.className = 'explosion';
        explosion.style.left = '400px'; 
        explosion.style.top = '150px';
        container.appendChild(explosion);
        setTimeout(() => explosion.remove(), 400);
        updateUI();
    }

    // 滑鼠點擊 - 射擊
    container.onmousedown = (e) => {
        if(!game.active || game.ammo <= 0) return;
        const rect = container.getBoundingClientRect();
        spawnBullet(400, 560, e.clientX - rect.left, e.clientY - rect.top, 'player');
        game.ammo--;
        updateUI();
    };

    function spawnBullet(x, y, tx, ty, side) {
        const el = document.createElement('div');
        el.className = 'bullet';
        container.appendChild(el);
        const angle = Math.atan2(ty - y, tx - x);
        game.bullets.push({ el, x, y, vx: Math.cos(angle) * 10, vy: Math.sin(angle) * 10, side });
    }

    function gameLoop() {
        if(!game.active) return;

        // 子彈移動與碰撞
        for(let i = game.bullets.length-1; i>=0; i--) {
            let b = game.bullets[i];
            b.x += b.vx; b.y += b.vy;
            b.el.style.left = b.x + 'px'; b.el.style.top = b.y + 'px';

            let hit = false;
            // 撞掩體 (損毀機制)
            game.covers.forEach(c => {
                if(b.x > c.x && b.x < c.x+90 && b.y > c.y && b.y < c.y+30) {
                    c.hp -= config.bulletDmg; hit = true;
                }
            });

            // 撞目標
            if(!hit) {
                if(b.side === 'player') {
                    game.enemies.forEach(en => {
                        if(b.x > en.x && b.x < en.x+35 && b.y > en.y && b.y < en.y+35) {
                            en.hp -= config.bulletDmg; hit = true;
                            if(en.hp <= 0) handleEnemyDeath(en);
                        }
                    });
                } else {
                    // 敵人打玩家 (玩家座標固定在中下方)
                    if(b.x > 370 && b.x < 420 && b.y > 540 && b.y < 590) {
                        game.hp -= config.bulletDmg; hit = true;
                        if(game.hp <= 0) endGame(false);
                    }
                }
            }

            if(hit || b.y < 0 || b.y > 600 || b.x < 0 || b.x > 800) {
                b.el.remove(); game.bullets.splice(i, 1);
            }
        }

        // 敵人AI射擊
        const now = Date.now();
        game.enemies.forEach(en => {
            if(now - en.lastShoot > 2000 + (Math.random() * 4000) / game.layer) {
                spawnBullet(en.x + 17, en.y + 17, 400, 560, 'enemy');
                en.lastShoot = now;
            }
            en.el.style.left = en.x + 'px'; en.el.style.top = en.y + 'px';
            en.el.innerText = en.hp;
        });

        // 掩體狀態更新
        game.covers = game.covers.filter(c => {
            if(c.hp <= 0) { c.el.remove(); return false; }
            c.el.style.left = c.x + 'px'; c.el.style.top = c.y + 'px';
            c.el.innerHTML = `🛡️耐久<br>${c.hp}`;
            c.el.style.opacity = 0.4 + (c.hp / config.coverMaxHp) * 0.6;
            return true;
        });

        if(game.enemies.length === 0 && game.active) nextLevel();

        updateUI();
        requestAnimationFrame(gameLoop);
    }

    function handleEnemyDeath(en) {
        if(!en.el.parentNode) return;
        
        // 動態掉落機制：高層數掉落機率更高
        const dropChance = game.layer >= 5 ? 0.45 : 0.25;
        if(Math.random() < dropChance) spawnItem(en.x, en.y);
        
        // 殺死敵人回彈 6 發
        game.ammo = Math.min(20, game.ammo + config.ammoAward);
        
        en.el.remove();
        game.enemies = game.enemies.filter(e => e !== en);
    }

    function spawnItem(x, y) {
        const item = document.createElement('div');
        const isPotion = Math.random() > 0.4;
        item.className = isPotion ? 'item potion entity' : 'item g-pack entity';
        item.style.left = x + 'px'; item.style.top = y + 'px';
        container.appendChild(item);
        item.onclick = (e) => {
            e.stopPropagation();
            if(isPotion) {
                game.hp = Math.min(50, game.hp + 20);
                alertText("血量恢復!");
            } else {
                game.grenades++;
                alertText("手榴彈+1");
            }
            item.remove();
            updateUI();
        };
    }

    function alertText(txt) {
        console.log(txt); // 可擴展為浮動文字
    }

    function nextLevel() {
        game.active = false;
        if(game.layer >= 6) { endGame(true); return; }
        
        overlay.style.display = 'flex';
        document.getElementById('overlay-title').innerText = `第 ${game.layer} 層 清除完成!`;
        document.getElementById('overlay-desc').innerText = `即將進入更危險的下一層...`;
        game.layer++;
    }

    function endGame(isWin) {
        game.active = false;
        overlay.style.display = 'flex';
        document.getElementById('overlay-title').innerText = isWin ? "🏆 任務成功" : "💀 你陣亡了";
        document.getElementById('overlay-desc').innerText = isWin ? "你成功守護了這片防區！" : `你死在了第 ${game.layer} 層...`;
        startBtn.innerText = "重新開始新戰局";
        game.layer = 1;
    }

    function updateUI() {
        document.getElementById('ui-layer').innerText = game.layer;
        document.getElementById('ui-hp').innerText = Math.max(0, game.hp);
        document.getElementById('ui-ammo').innerText = game.ammo;
        document.getElementById('ui-grenade').innerText = game.grenades;
        document.getElementById('ui-enemy-count').innerText = game.enemies.length;
    }
</script>
</body>
</html>
